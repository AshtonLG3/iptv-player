<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FTA IPTV Player</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <main class="layout">
    <button id="drawer-handle" class="drawer-handle" type="button" aria-label="Show channels" aria-expanded="false"></button>
    <div class="sidebar-column">
      <div id="app">Loading FTA channels...</div>
      <button id="retry-button" type="button" hidden>Retry loading channels</button>
    </div>
    <section class="player-panel">
      <video id="video" controls></video>
      <div class="landscape-channel-nav" aria-label="Channel navigation">
        <button id="previous-channel-button" class="channel-nav-button" type="button" aria-label="Previous channel" disabled></button>
        <button id="next-channel-button" class="channel-nav-button" type="button" aria-label="Next channel" disabled></button>
      </div>
      <p id="player-status" hidden></p>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
